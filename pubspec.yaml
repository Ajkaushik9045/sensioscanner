name: sensioscanner
description: "BLE Vitals Scanner — Discover, connect, and stream data from BLE peripherals."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.0


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_reactive_ble: ^5.5.0
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.2.3
  equatable: ^2.0.8
  permission_handler: ^12.0.1
  dartz: ^0.10.1
  rxdart: ^0.28.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true